name: CI

# Runs on every PR (gates merge) and on pushes to main (post-merge safety net).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Each app job (lint/typecheck/test/build) reports a status check whose name is
# EXACTLY the context required by the `protect-main` ruleset. They must always
# run and conclude (no job-level skips), or a required check would hang on
# "Expected". The runner (.github/scripts/run-script.sh) fails CLOSED: a missing
# package.json or a missing npm script errors the check rather than passing, so
# the gate can't be silently disabled by editing package.json.
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: bash .github/scripts/run-script.sh lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: bash .github/scripts/run-script.sh typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: bash .github/scripts/run-script.sh test

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: bash .github/scripts/run-script.sh build

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history: need the PR base commit (PRs) and all commits (push to main)
      # Run gitleaks via its official image (free for personal accounts; avoids
      # the Action's Node-runtime deprecation). `git` mode scans committed
      # history only, so the local untracked .env is never read.
      - name: gitleaks (scan committed history for secrets)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "${BASE_SHA:-}" ]; then
            # PR: scan ONLY the commits this PR introduces. A full-history scan on
            # every PR means a secret already committed to main's history would
            # fail EVERY future PR forever (a permanent gate-lock). Restricting to
            # the PR range still catches anything the PR itself adds.
            echo "Scanning PR commit range ${BASE_SHA}..HEAD"
            # gitleaks v8.30.1, pinned by digest
            docker run --rm -v "$PWD:/repo" \
              ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
              git --redact --exit-code 1 --log-opts="${BASE_SHA}..HEAD" /repo
          else
            # push to main (post-merge safety net): scan full history.
            echo "Scanning full history"
            # gitleaks v8.30.1, pinned by digest
            docker run --rm -v "$PWD:/repo" \
              ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
              git --redact --exit-code 1 /repo
          fi

  # PR-title lint: the title becomes the squash commit message, so enforcing
  # Conventional Commits here gives main a clean, conventional history.
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Advisory (NOT a required check): nudges branch-naming without risking lockout.
  branch-name:
    name: branch-name
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|chore|docs|refactor|test|ci|perf|build|revert)/'
          if [[ ! "$HEAD_REF" =~ $pattern ]]; then
            echo "::error::Branch '$HEAD_REF' must start with one of: feat/ fix/ chore/ docs/ refactor/ test/ ci/ perf/ build/ revert/"
            exit 1
          fi
          echo "Branch name OK: $HEAD_REF"

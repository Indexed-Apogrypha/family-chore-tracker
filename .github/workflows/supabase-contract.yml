name: Supabase contract suites

# The Supabase contract suites (`npm run test:supabase`) exercise the real
# Supabase repository/storage adapters against a LIVE Postgres + Auth + Storage
# stack — they prove the in-memory and Supabase sides of each seam interchangeable
# (#135). They depend on an external stack, so they MUST NOT gate merges: this
# workflow runs ONLY nightly + on-demand, never on pull_request/push. Nothing here
# is a required check, so a flake or an upstream outage can never block a merge.
#
# The DB is ephemeral and created fresh in the runner by the Supabase CLI
# (`supabase start`), so this never touches the staging or production projects and
# needs no project secrets.
on:
  schedule:
    # 07:00 UTC daily (~midnight US Pacific) — off peak, well after typical merges.
    - cron: "0 7 * * *"
  workflow_dispatch:

# Least privilege: only read the code. No deploys, no project secrets — the stack
# is local to the runner.
permissions:
  contents: read

concurrency:
  group: supabase-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase-contract:
    name: supabase-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # TODO(verify SHA): pin verified before this first runs. This is the commit
      # for supabase/setup-cli v1.0.0 (tag-resolved); confirm it on github.com
      # before relying on it. This workflow is nightly + non-blocking, so an
      # unverified pin here can never gate a merge.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@2f5b6da6e6e88296b6e4f4a3f10f5ca1d5d0a51c # v1.0.0
        with:
          version: latest

      - name: Install dependencies
        run: npm ci

      # Bring up the ephemeral local stack (Postgres/Auth/Storage in Docker) and
      # apply every committed migration from supabase/migrations/. `db reset`
      # recreates the database from scratch and replays the ordered migrations, so
      # the suites run against exactly the schema we ship.
      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations (db reset replays supabase/migrations/)
        run: supabase db reset --no-seed

      # Wire `test:supabase` to the LOCAL stack. The CLI prints the stack's
      # connection details as shell-assignable env (`API_URL`, `SERVICE_ROLE_KEY`,
      # …); map those onto the canonical names the suites read (SUPABASE_URL /
      # SUPABASE_SERVICE_ROLE_KEY — see test/contract/repositories.supabase.test.ts
      # and vitest.supabase.config.ts). No `.env` exists in CI, so the namespaced
      # resolver no-ops and the canonical names we export here are used directly.
      - name: Run Supabase contract suites against the local stack
        run: |
          set -euo pipefail
          # `supabase status -o env` emits KEY="value" lines for the running stack.
          eval "$(supabase status -o env)"
          export SUPABASE_URL="$API_URL"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export SUPABASE_ANON_KEY="$ANON_KEY"
          npm run test:supabase

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

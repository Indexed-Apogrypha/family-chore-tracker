name: CodeQL

# Static analysis (code scanning) for the JS/TS code and the GitHub Actions
# workflows. Findings surface under the repo's Security -> Code scanning tab.
#
# This committed workflow is the single source of truth for code scanning, so
# GitHub's "default setup" is kept DISABLED (apply-governance.sh enforces this) —
# the two configurations cannot run at the same time.
#
# ADVISORY, NOT a required check: code scanning is asynchronous and can be slow.
# It is intentionally NOT in the `protect-main` required checks, so a slow or
# failing run never blocks a merge. As the app's surface grows it can be promoted
# to a required check in
# .github/rulesets/protect-main.json + .github/setup/apply-governance.sh.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so dormant code still gets re-scanned as CodeQL queries improve.
    - cron: '27 4 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript: the app code. actions: the workflow files
        # themselves (catches e.g. script injection via untrusted ${{ ... }}).
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Both languages are interpreted, so CodeQL scans source directly.
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

name: Deploy to Vercel

# Deploy on merge to main. The REAL gate is `if: github.ref == 'refs/heads/main'`
# (authoritative on every plan). `environment: production` additionally applies
# this repo's environment protection rules — required reviewers / wait timer —
# but those are only ENFORCED on GitHub Pro/Team/Enterprise; on a free personal
# private repo they are ignored, so we do not rely on them for correctness.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false # never kill an in-flight production deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      # Skip cleanly (green, not red) until the app + Vercel secrets exist.
      - name: Check deploy preconditions
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ ! -f package.json ]; then
            echo "No package.json (app not built yet) — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Preconditions met — proceeding with deploy."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel production settings
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts to production
        if: steps.guard.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

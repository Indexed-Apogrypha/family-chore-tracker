name: Deploy (staging → production)

# Every merge to `main` auto-deploys to an ISOLATED staging environment (its own
# Supabase backend, via Vercel's Preview env scope). Graduating to production is a
# GATED REBUILD of the same commit with production env — we can't byte-promote the
# staging artifact because it bakes in staging's database (`NEXT_PUBLIC_*` differ).
#
# The `production` job waits at the `production` environment's required-reviewers
# gate; one approval graduates the exact commit staging validated (`github.sha`).
#
# The guard keeps both jobs GREEN (skipped, not failed) until the Vercel secrets +
# app exist, so the pipeline is safe to merge before configuration is complete.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA / ref to deploy (defaults to the triggering commit)"
        required: false
        type: string

# Least privilege: both jobs only check out code; deploys authenticate with
# VERCEL_TOKEN, not GITHUB_TOKEN. (CodeQL: pin workflow token permissions.)
permissions:
  contents: read

concurrency:
  group: deploy-pipeline
  cancel-in-progress: false # never kill an in-flight production build

jobs:
  staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Check deploy preconditions
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ ! -f package.json ]; then
            echo "No package.json — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ -z "${BYPASS:-}" ]; then
            # Fail FAST and LOUD: the runtime smoke checks send the bypass header,
            # so a missing bypass secret would otherwise surface as a confusing 401
            # deep in the run and wedge every deploy. Make the cause explicit here.
            echo "::error::VERCEL_TOKEN is set but VERCEL_AUTOMATION_BYPASS_SECRET is missing — the smoke checks would 401. Configure the bypass secret, or unset VERCEL_TOKEN to skip deploys."
            exit 1
          else
            echo "Preconditions met — proceeding with staging deploy."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Pull staging (Preview) settings
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (staging env)
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts to staging
        id: deploy
        if: steps.guard.outputs.ready == 'true'
        run: |
          out="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "$out"
          url="$(printf '%s\n' "$out" | grep -Eo 'https://[a-z0-9-]+\.vercel\.app' | tail -n1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Catch RUNTIME failures a green build can't (e.g. the Sensitive-env 500:
      # the build succeeds but every request 500s). Staging sits behind Vercel
      # Deployment Protection (anon → 401), so authenticate the probe with the
      # project's Protection-Bypass-for-Automation secret. A non-200 fails the
      # job, and because `production` is `needs: staging`, that blocks the gate.
      - name: Smoke-check staging (runtime 200)
        if: steps.guard.outputs.ready == 'true'
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          url="${{ steps.deploy.outputs.url }}"
          code="$(curl -H "x-vercel-protection-bypass: $BYPASS" -sSL --max-time 30 \
            -o /dev/null -w '%{http_code}' "$url/")"
          echo "GET $url/ (bypass) -> $code"
          if [ "$code" != "200" ]; then
            echo "::error::Staging smoke check failed: expected 200, got $code"
            exit 1
          fi

      - name: Alias to the stable staging URL
        if: steps.guard.outputs.ready == 'true'
        run: |
          vercel alias set "${{ steps.deploy.outputs.url }}" \
            family-chore-tracker-staging.vercel.app --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Summary
        if: steps.guard.outputs.ready == 'true'
        run: |
          {
            echo "### ✅ Staging deployed"
            echo ""
            echo "- Deployment: ${{ steps.deploy.outputs.url }}"
            echo "- Stable URL: https://family-chore-tracker-staging.vercel.app"
            echo "- Commit: \`${{ github.event.inputs.ref || github.sha }}\`"
            echo ""
            echo "Approve the **production** job below to graduate this exact commit to prod."
          } >> "$GITHUB_STEP_SUMMARY"

  # Schema gate (#138): before the gated production deploy, verify the prod
  # database's schema MATCHES the committed migrations under supabase/migrations/.
  # `production` `needs:` this job, so divergence (a migration committed but not
  # applied, or the live schema drifted out from under the repo) FAILS here and
  # the gated prod graduation never runs — a code deploy can't race ahead of an
  # unapplied schema change.
  #
  # Guard pattern mirrors the deploy jobs: if the Supabase secrets are absent the
  # job is GREEN (skipped, not failed), so the pipeline is safe to merge before
  # the migration secrets are configured. Uses repository secrets only; no values
  # are invented here.
  migrations:
    name: Apply migrations / check schema drift
    needs: staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Check migration preconditions
        id: guard
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "Supabase migration secrets not all set — skipping schema gate (pipeline safe before config)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Preconditions met — running schema gate against the target project."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # TODO(verify SHA): confirm this commit on github.com before relying on it.
      # This is the commit for supabase/setup-cli v1.0.0 (tag-resolved).
      - name: Install Supabase CLI
        if: steps.guard.outputs.ready == 'true'
        uses: supabase/setup-cli@2f5b6da6e6e88296b6e4f4a3f10f5ca1d5d0a51c # v1.0.0
        with:
          version: latest

      - name: Link the target Supabase project
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      # Detect drift, THEN apply. `db push --dry-run` lists the committed
      # migrations the remote has NOT applied; `migration list` shows the
      # local/remote ledgers side by side for the log. Then `db push` applies any
      # pending committed migrations so the schema matches the code we are about to
      # deploy. Every command runs with `set -euo pipefail`, so a CLI error
      # (auth/connection/SQL failure) fails the job and blocks the gated prod
      # graduation that `needs:` this job.
      - name: Show local vs remote migration ledgers
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase migration list

      - name: Apply committed migrations to the target DB (fail on error)
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          # Preview the pending migrations for the run log…
          supabase db push --dry-run
          # …then apply them. If committed migrations cannot be applied (e.g. they
          # conflict with the live schema), this exits non-zero and fails the job.
          supabase db push --yes

      # Belt-and-suspenders: after pushing, assert there is NO remaining schema
      # drift between the committed migrations and the live schema. `db diff`
      # prints the SQL needed to reconcile the linked DB to the local migrations;
      # any non-empty output here means the live schema diverged in a way the
      # migrations don't capture — FAIL so we never deploy code against a schema
      # the repo doesn't describe.
      - name: Fail on remaining schema drift
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          diff_out="$(supabase db diff --linked)"
          printf '%s\n' "$diff_out"
          if [ -n "$(printf '%s' "$diff_out" | tr -d '[:space:]')" ]; then
            echo "::error::Schema drift detected: the linked database does not match the committed migrations in supabase/migrations/. Reconcile before deploying."
            exit 1
          fi
          echo "No schema drift — committed migrations match the target schema."

  production:
    name: Graduate to production
    needs: [staging, migrations]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production # required-reviewers gate — graduation waits here
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      # Re-checkout the SAME commit staging validated, then rebuild with prod env.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Check deploy preconditions
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ ! -f package.json ]; then
            echo "No package.json — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ -z "${BYPASS:-}" ]; then
            # Fail FAST and LOUD: the pre-promote smoke sends the bypass header,
            # so a missing bypass secret would otherwise surface as a confusing 401
            # deep in the run and wedge every deploy. Make the cause explicit here.
            echo "::error::VERCEL_TOKEN is set but VERCEL_AUTOMATION_BYPASS_SECRET is missing — the smoke checks would 401. Configure the bypass secret, or unset VERCEL_TOKEN to skip deploys."
            exit 1
          else
            echo "Preconditions met — proceeding with production deploy."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Pull production settings
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (production env)
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Capture the deployment currently serving production BEFORE we promote the
      # new one, so the post-promote check can restore it on failure. Best-effort:
      # if it can't be resolved, auto-rollback is unavailable and step 5 falls
      # back to the manual instructions (no worse than before). The stable
      # aliases are filtered out so we keep the unique deployment URL, which is
      # what `vercel promote` accepts as a rollback target.
      - name: Capture current production deployment (rollback target)
        id: prev
        if: steps.guard.outputs.ready == 'true'
        run: |
          prev="$(vercel inspect family-chore-tracker-psi.vercel.app \
            --scope matthew-harpers-projects --token="$VERCEL_TOKEN" 2>&1 \
            | grep -Eo 'https://[a-z0-9-]+\.vercel\.app' \
            | grep -Ev 'family-chore-tracker-(psi|staging)\.vercel\.app' \
            | head -n1 || true)"
          if [ -n "$prev" ]; then
            echo "Current production deployment (rollback target): $prev"
          else
            echo "::warning::Could not resolve the current production deployment — auto-rollback will be unavailable."
          fi
          echo "url=$prev" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Production graduation — every wait is bounded so the job can never hang,
      # and the build is proven healthy at RUNTIME before the domain flips:
      #   0) capture prev        → record the deployment currently serving prod,
      #                            so step 5 can auto-roll-back to it if needed.
      #   1) deploy --no-wait    → returns immediately with the deployment URL
      #                            (the inline --prod wait HANGS on this project:
      #                             READY but never returns, observed 25min+).
      #   2) inspect --wait      → bounded readiness gate (cannot hang).
      #   3) smoke (pre-promote) → curl the deployment's public URL; a runtime 500
      #                            fails HERE, before the domain flips, so prod
      #                            keeps serving the last-good build.
      #   4) promote             → flip the production domain (~1s).
      #   5) confirm (post)      → assert the production domain itself is 200; if
      #                            not, auto-roll-back to the step-0 deployment so
      #                            prod is restored, then fail the job.
      # NB: promote/inspect resolve a deployment by URL and do NOT inherit the team
      # from VERCEL_ORG_ID, so they need an explicit --scope <team-slug> — without
      # it promote fails "Deployment belongs to a different team" (run 28024463409).
      - name: Deploy prebuilt artifacts to production (no-wait)
        id: deploy
        if: steps.guard.outputs.ready == 'true'
        run: |
          out="$(vercel deploy --prebuilt --prod --skip-domain --no-wait --token="$VERCEL_TOKEN")"
          echo "$out"
          url="$(printf '%s\n' "$out" | grep -Eo 'https://[a-z0-9-]+\.vercel\.app' | tail -n1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Wait for the deployment to be READY (bounded)
        if: steps.guard.outputs.ready == 'true'
        run: |
          vercel inspect "${{ steps.deploy.outputs.url }}" \
            --wait --timeout 5m \
            --scope matthew-harpers-projects --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # The production deployment's unique *.vercel.app URL sits behind Vercel
      # Deployment Protection too (anon -> 401) whenever protection covers "all
      # deployments", so authenticate this probe with the Protection-Bypass
      # secret exactly like the staging smoke does. Without it, a protected
      # deployment URL 401s here and blocks EVERY production promotion.
      - name: Smoke-check the production build (pre-promote)
        if: steps.guard.outputs.ready == 'true'
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          url="${{ steps.deploy.outputs.url }}"
          code="$(curl -H "x-vercel-protection-bypass: $BYPASS" -sSL --max-time 30 \
            -o /dev/null -w '%{http_code}' "$url/")"
          echo "GET $url/ (bypass) -> $code"
          if [ "$code" != "200" ]; then
            echo "::error::Pre-promote smoke failed: expected 200, got $code — NOT promoting."
            exit 1
          fi

      - name: Promote the validated build to the production domain
        if: steps.guard.outputs.ready == 'true'
        run: |
          vercel promote "${{ steps.deploy.outputs.url }}" --yes \
            --scope matthew-harpers-projects --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # The domain has already flipped, so a failure here means prod is serving a
      # bad build. Auto-roll-back by re-promoting the step-0 deployment, then fail
      # the job so the bad release is visible (red) and not silently "deployed".
      - name: Confirm the production domain is 200 (post-promote; auto-rollback on failure)
        if: steps.guard.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PREV_URL: ${{ steps.prev.outputs.url }}
        run: |
          code="$(curl -sSL --max-time 30 -o /dev/null -w '%{http_code}' \
            https://family-chore-tracker-psi.vercel.app/)"
          echo "GET https://family-chore-tracker-psi.vercel.app/ -> $code"
          if [ "$code" = "200" ]; then
            exit 0
          fi

          echo "::error::Post-promote check failed: prod domain returned $code."
          if [ -z "${PREV_URL:-}" ]; then
            echo "::error::No rollback target was captured. Manually roll back: vercel rollback <previous-deployment> --scope matthew-harpers-projects --token=…"
            exit 1
          fi

          echo "Rolling production back to the last-good deployment: $PREV_URL"
          if vercel promote "$PREV_URL" --yes \
               --scope matthew-harpers-projects --token="$VERCEL_TOKEN"; then
            rb="$(curl -sSL --max-time 30 -o /dev/null -w '%{http_code}' \
              https://family-chore-tracker-psi.vercel.app/)"
            echo "Post-rollback GET https://family-chore-tracker-psi.vercel.app/ -> $rb"
            if [ "$rb" = "200" ]; then
              echo "::error::Production was rolled back to $PREV_URL (now 200). Failing the job: the new build did not pass its smoke check."
            else
              echo "::error::Rolled back to $PREV_URL but prod still returns $rb — MANUAL INTERVENTION REQUIRED."
            fi
          else
            echo "::error::AUTOMATIC ROLLBACK FAILED. Manually roll back: vercel rollback $PREV_URL --scope matthew-harpers-projects --token=…"
          fi
          exit 1

      - name: Summary
        if: steps.guard.outputs.ready == 'true'
        run: |
          {
            echo "### 🚀 Production deployed"
            echo ""
            echo "- Deployment: ${{ steps.deploy.outputs.url }}"
            echo "- Commit: \`${{ github.event.inputs.ref || github.sha }}\`"
            echo ""
            echo "Rollback if needed: \`vercel rollback <previous-deployment> --token=…\`"
          } >> "$GITHUB_STEP_SUMMARY"
